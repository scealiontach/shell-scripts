---
default_language_version:
  # force all unspecified python hooks to run python3
  python: python3
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
        exclude: "charts/.*"
        args:
          - --allow-multiple-documents
      - id: detect-aws-credentials
        args:
          - --allow-missing-credentials
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: no-commit-to-branch
        args:
          - --pattern
          - '^(?!((fix|feature|refactor|sprint)\/[a-zA-Z0-9\-]+)$).*'
      - id: trailing-whitespace
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: forbid-binary
        exclude: ".*.(png|jpg|jpeg)$"
      - id: shellcheck
        args:
          - -a
          - -x
          - -P
          - SCRIPTDIR
      - id: script-must-have-extension
        # bats specs use the .bats extension, and helpers.bash is a
        # bats-loaded helper file — neither should be renamed to .sh.
        exclude: "^tests/.*\\.(bats|bash)$"
      - id: script-must-not-have-extension
      - id: shfmt
        args:
          - -l
          - -i
          - "2"
          - -ci
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.15.0
    hooks:
      - id: markdownlint
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: forbid-tabs
        exclude: "^(Makefile|.*.mk|.*.go|\\.gitmodules)$"
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        exclude: ".*/templates/.*"
  - repo: local
    hooks:
      - id: bats
        name: bats
        entry: tests/bats/bin/bats
        language: system
        pass_filenames: false
        always_run: true
        args:
          - "--tap"
          - "tests"
      - id: lib-funcs-must-be-namespaced
        name: lib-funcs-must-be-namespaced
        # AGENTS.md mandates that every function in a bash/*.sh library use
        # `package::name` qualification. Bare `function foo` definitions
        # leak globals, defeat bashadoc (which filters by `^$package::`),
        # and create cross-library collision risk. Backward-compat shims
        # are still allowed via the parens-only `foo() { ... }` form,
        # which this hook does not flag.
        entry: bash tests/check-lib-namespaces.sh
        language: system
        files: ^bash/[^/]+\.sh$
        pass_filenames: true
