---
# This is a basic workflow to help you get started with Actions
name: pre-commit

# Controls when the workflow will run
# yamllint disable-line rule:truthy
on:
  # Triggers the workflow on push or pull request events
  # but only for the "main" branch
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# A workflow run is made up of one or more jobs that can run
# sequentially or in parallel
jobs:
  # This workflow contains a single job called "main"
  pre-commit:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed
    # as part of the job
    steps:
      - uses: actions/checkout@v4
        with:
          # The bats local pre-commit hook executes tests/bats/bin/bats,
          # which lives in a git submodule. Without recursive init the
          # hook fails with "Executable 'tests/bats/bin/bats' not found".
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: no-commit-to-branch
